{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "praetor-audit-sink.fullname" . }}-ingress
  labels:
    {{- include "praetor-audit-sink.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "praetor-audit-sink.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.clientPodSelector | nindent 14 }}
              {{- if .Values.networkPolicy.sameReleaseOnly }}
              app.kubernetes.io/instance: {{ .Release.Name }}
              {{- end }}
      ports:
        - { port: mtls, protocol: TCP }
{{- end }}
