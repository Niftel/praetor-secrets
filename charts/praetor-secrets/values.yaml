replicaCount: 1

image:
  repository: ghcr.io/niftel/praetor-secrets
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  port: 8443
  healthPort: 8081

trustDomain: ""

# Required pre-existing Secret names. Key contents are never accepted in Helm
# values. See README.md for the exact keys and certificate identities.
secrets:
  runtimeSecret: ""       # database-url, master-key, audit-key; optionally previous-key
  serverTLSSecret: ""     # tls.crt, tls.key, ca.crt (workload client CA)
  auditSinkTLSSecret: ""  # tls.crt, tls.key, ca.crt (audit sink server CA)
  previousKeyEnabled: false

auditSink:
  url: ""
  serviceName: ""
  serviceNamespace: ""
  servicePort: 8444
  batchSize: 100
  pollInterval: 1s
  requestTimeout: 5s

networkPolicy:
  enabled: true
  sameReleaseOnly: false
  clientPodSelectors:
    - app.kubernetes.io/component: api
    - app.kubernetes.io/component: scheduler
    - app.kubernetes.io/component: executor
  additionalIngress: []

limits:
  databaseConnections: 10
  networkConnections: 100
  pendingAuditEvents: 100000
  shutdownTimeout: 20s

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
podAnnotations: {}
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}
tolerations: []
affinity: {}
