{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "praetor-secrets.fullname" . }}-ingress
  labels:
    {{- include "praetor-secrets.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "praetor-secrets.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    {{- range .Values.networkPolicy.clientPodSelectors }}
    - from:
        - podSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
              {{- if $.Values.networkPolicy.sameReleaseOnly }}
              app.kubernetes.io/instance: {{ $.Release.Name }}
              {{- end }}
      ports:
        - { port: mtls, protocol: TCP }
    {{- end }}
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
