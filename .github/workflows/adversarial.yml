name: Adversarial security gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  adversarial:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17.10-alpine3.23@sha256:8189a1f6e40904781fc9e2612687877791d21679866db58b1de996b31fc312e4
        env:
          POSTGRES_USER: praetor_test
          POSTGRES_PASSWORD: praetor_test
          POSTGRES_DB: praetor_secrets_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U praetor_test -d praetor_secrets_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run adversarial gates
        env:
          PRAETOR_SECRETS_TEST_DATABASE_URL: postgres://praetor_test:praetor_test@127.0.0.1:5432/praetor_secrets_test?sslmode=disable
        run: scripts/run-adversarial-gates.sh

      - name: Run code-level security gates
        env:
          PRAETOR_SECRETS_TEST_DATABASE_URL: postgres://praetor_test:praetor_test@127.0.0.1:5432/praetor_secrets_test?sslmode=disable
        run: scripts/run-code-security-gates.sh
